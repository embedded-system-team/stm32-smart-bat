<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="844" viewBox="0 0 1500 844">
  <defs>
    <style>
      .bg { fill: #f7f8fb; }
      .title { font: 700 54px Arial, sans-serif; fill: #182033; }
      .subtitle { font: 400 24px Arial, sans-serif; fill: #667085; }
      .section-title { font: 700 28px Arial, sans-serif; fill: #182033; }
      .label { font: 700 25px Arial, sans-serif; fill: #182033; }
      .small { font: 400 20px Arial, sans-serif; fill: #475467; }
      .tiny { font: 400 17px Arial, sans-serif; fill: #667085; }
      .box { fill: #ffffff; stroke: #d0d5dd; stroke-width: 2; rx: 18; }
      .box-blue { fill: #eef6ff; stroke: #84c5ff; stroke-width: 2; rx: 18; }
      .box-green { fill: #eefbf3; stroke: #8bd7a8; stroke-width: 2; rx: 18; }
      .box-orange { fill: #fff5e8; stroke: #ffc078; stroke-width: 2; rx: 18; }
      .box-purple { fill: #f4f0ff; stroke: #b8a6ff; stroke-width: 2; rx: 18; }
      .chip { fill: #ffffff; stroke: #d0d5dd; stroke-width: 1.5; rx: 16; }
      .arrow { stroke: #344054; stroke-width: 4; fill: none; marker-end: url(#arrow); }
      .arrow-blue { stroke: #1570ef; stroke-width: 4; fill: none; marker-end: url(#arrow-blue); }
      .arrow-purple { stroke: #7a5af8; stroke-width: 4; fill: none; marker-end: url(#arrow-purple); }
      .note { fill: #ffffff; stroke: #eaecf0; stroke-width: 2; rx: 18; }
    </style>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto">
      <path d="M2,2 L12,7 L2,12 Z" fill="#344054"/>
    </marker>
    <marker id="arrow-blue" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto">
      <path d="M2,2 L12,7 L2,12 Z" fill="#1570ef"/>
    </marker>
    <marker id="arrow-purple" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto">
      <path d="M2,2 L12,7 L2,12 Z" fill="#7a5af8"/>
    </marker>
  </defs>

  <rect class="bg" width="1500" height="844"/>
  <text x="750" y="78" text-anchor="middle" class="title">Smart Bat System Architecture</text>
  <text x="750" y="116" text-anchor="middle" class="subtitle">Real-Time Swing Detection + Post-Swing CMSIS-DSP Analysis</text>

  <rect x="70" y="170" width="420" height="500" class="box-blue"/>
  <text x="280" y="215" text-anchor="middle" class="section-title">STM32 Smart Bat</text>
  <text x="280" y="250" text-anchor="middle" class="small">B-L475E-IOT01A1 + LSM6DSL IMU</text>

  <rect x="125" y="290" width="310" height="70" class="chip"/>
  <text x="280" y="322" text-anchor="middle" class="label">IMU Sampling</text>
  <text x="280" y="350" text-anchor="middle" class="tiny">Acceleration + Gyroscope</text>

  <rect x="105" y="410" width="165" height="120" class="box-green"/>
  <text x="187" y="445" text-anchor="middle" class="label">Real-Time</text>
  <text x="187" y="474" text-anchor="middle" class="label">Detection</text>
  <text x="187" y="505" text-anchor="middle" class="tiny">State machine</text>

  <rect x="290" y="410" width="165" height="120" class="box-orange"/>
  <text x="372" y="445" text-anchor="middle" class="label">DSP</text>
  <text x="372" y="474" text-anchor="middle" class="label">Analysis</text>
  <text x="372" y="505" text-anchor="middle" class="tiny">After swing ends</text>

  <rect x="95" y="575" width="185" height="66" class="chip"/>
  <text x="187" y="604" text-anchor="middle" class="tiny">Trigger +</text>
  <text x="187" y="628" text-anchor="middle" class="tiny">Vibration</text>

  <rect x="300" y="575" width="145" height="66" class="chip"/>
  <text x="372" y="604" text-anchor="middle" class="tiny">SWING_END</text>
  <text x="372" y="628" text-anchor="middle" class="tiny">Metrics</text>

  <path d="M280 360 L280 385 L187 385 L187 410" class="arrow-blue"/>
  <path d="M280 360 L280 385 L372 385 L372 410" class="arrow-purple"/>
  <path d="M187 530 L187 575" class="arrow-blue"/>
  <path d="M372 530 L372 575" class="arrow-purple"/>

  <rect x="565" y="305" width="170" height="140" class="box"/>
  <text x="650" y="365" text-anchor="middle" class="section-title">Wi-Fi</text>
  <text x="650" y="398" text-anchor="middle" class="small">UDP Events</text>

  <rect x="810" y="245" width="250" height="260" class="box-purple"/>
  <text x="935" y="300" text-anchor="middle" class="section-title">PC Bridge</text>
  <text x="935" y="340" text-anchor="middle" class="small">host/swing_bridge.py</text>
  <text x="935" y="382" text-anchor="middle" class="small">Parse events</text>
  <text x="935" y="414" text-anchor="middle" class="small">Rebuild peak time</text>
  <text x="935" y="446" text-anchor="middle" class="small">Forward JSON</text>

  <rect x="1140" y="245" width="290" height="260" class="box-green"/>
  <text x="1285" y="300" text-anchor="middle" class="section-title">Godot 3D</text>
  <text x="1285" y="340" text-anchor="middle" class="small">Hit judgment</text>
  <text x="1285" y="372" text-anchor="middle" class="small">Swing score</text>
  <text x="1285" y="404" text-anchor="middle" class="small">Visual feedback</text>
  <text x="1285" y="436" text-anchor="middle" class="small">EARLY / GOOD / LATE</text>

  <path d="M490 375 L565 375" class="arrow"/>
  <path d="M735 375 L810 375" class="arrow"/>
  <path d="M1060 375 L1140 375" class="arrow"/>

  <text x="528" y="350" text-anchor="middle" class="tiny">wireless</text>
  <text x="772" y="350" text-anchor="middle" class="tiny">events</text>
  <text x="1100" y="350" text-anchor="middle" class="tiny">JSON</text>

  <rect x="115" y="705" width="1270" height="82" class="note"/>
  <text x="750" y="738" text-anchor="middle" class="label">Design Focus</text>
  <text x="750" y="770" text-anchor="middle" class="small">IMU samples are split into a low-latency detection path and a post-swing DSP analysis path.</text>
  <text x="750" y="798" text-anchor="middle" class="small">DSP features improve scoring without delaying the real-time swing trigger.</text>
</svg>
